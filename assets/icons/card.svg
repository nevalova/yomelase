      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.95  0 0 0 0 1  0 0 0 0.9 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
