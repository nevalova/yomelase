<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA...", // Pon tus datos reales aquí
        databaseURL: "https://party-music-default-rtdb.firebaseio.com",
        projectId: "party-music"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let sala = "";
    let miId = "";
    let player;
    let esHost = false;
    let youtubeListo = false; // Nueva bandera de control

    const urlParams = new URLSearchParams(window.location.search);
    const salaParam = urlParams.get('sala');
    if(salaParam) startMando(salaParam.toUpperCase());

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- LÓGICA TV ---
    function initTV() {
        esHost = true;
        sala = Math.random().toString(36).substring(2,6).toUpperCase();
        document.getElementById('room-display').innerText = "SALA: " + sala;
        
        const joinUrl = window.location.origin + window.location.pathname + "?sala=" + sala;
        QRCode.toCanvas(document.getElementById('canvas-qr'), joinUrl);
        
        switchView('view-tv');
        escucharJugadores();
        syncGame();
    }

    // Se llama automáticamente por la API de YouTube
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-bg', {
            height: '100%',
            width: '100%',
            playerVars: { 
                'autoplay': 1, 
                'controls': 0, 
                'mute': 0, 
                'playsinline': 1,
                'origin': window.location.origin 
            },
            events: {
                'onReady': () => { 
                    youtubeListo = true; 
                    console.log("YouTube Ready");
                }
            }
        });
    }

    function nextShort() {
        if(!sala) return;
        // Seleccionamos canción aleatoria de canciones.js
        const track = CANCIONES[Math.floor(Math.random() * CANCIONES.length)];
        
        // Actualizamos Firebase
        db.ref(`salas/${sala}/game`).set({
            ytId: track.youtubeId,
            spId: track.spotifyId,
            year: track.year,
            title: track.titulo,
            artist: track.artista,
            revealed: false,
            timestamp: Date.now() // Forzamos actualización para que Firebase detecte el cambio
        }).then(() => console.log("Nueva canción enviada"));
    }

    function revealTV() { 
        if(!sala) return;
        db.ref(`salas/${sala}/game/revealed`).set(true); 
    }

    // --- LÓGICA MANDO ---
    function initMandoManual() {
        const code = document.getElementById('join-code').value.toUpperCase();
        if(code) window.location.href = "?sala=" + code;
    }

    function startMando(id) {
        sala = id;
        document.getElementById('mando-room-id').innerText = "SALA: " + id;
        switchView('view-mando');
        syncGame();
    }

    function registrarJugador() {
        const nombre = document.getElementById('mando-nombre').value.trim();
        if(!nombre) return;
        miId = "p_" + Date.now();
        db.ref(`salas/${sala}/jugadores/${miId}`).set({ nombre, tokens: 3, cartas: 0 });
        
        document.getElementById('mando-setup').classList.add('hidden');
        document.getElementById('mando-juego').classList.remove('hidden');
        escucharMisDatos();
    }

    function revealMando() {
        db.ref(`salas/${sala}/jugadores/${miId}/tokens`).transaction(t => {
            if (t >= 3) {
                db.ref(`salas/${sala}/game/revealed`).set(true);
                return t - 3;
            }
            alert("No tienes suficientes tokens");
            return t;
        });
    }

    // --- SINCRONIZACIÓN ---
    function escucharJugadores() {
        db.ref(`salas/${sala}/jugadores`).on('value', snap => {
            const devs = snap.val();
            const div = document.getElementById('lista-jugadores');
            div.innerHTML = "";
            if(devs) {
                Object.values(devs).forEach(p => {
                    div.innerHTML += `<span class="player-tag">👤 ${p.nombre} (🪙 ${p.tokens})</span>`;
                });
            }
        });
    }

    function escucharMisDatos() {
        db.ref(`salas/${sala}/jugadores/${miId}`).on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('mando-tokens').innerText = d.tokens;
                document.getElementById('mando-cartas').innerText = d.cartas || 0;
            }
        });
    }

    function syncGame() {
        db.ref(`salas/${sala}/game`).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            if(esHost) {
                // Si el reproductor está listo, cargamos el video
                if(youtubeListo && player && player.loadVideoById) {
                    player.loadVideoById(data.ytId);
                    player.unMute();
                    player.playVideo();
                }
                
                document.getElementById('tv-status').innerText = data.revealed ? 
                    `${data.title} - ${data.artist} (${data.year})` : "🎵 ADIVINA LA CANCIÓN";
                
                document.getElementById('qr-area').style.opacity = data.revealed ? "1" : "0.2";
            } else {
                // Lógica del Mando
                const btn = document.getElementById('btn-spoti');
                if(data.spId && !data.revealed) btn.classList.remove('hidden');
                else btn.classList.add('hidden');
                
                document.getElementById('mando-msg').innerText = data.revealed ? "¡Revelado!" : "Escuchando...";
            }
        });
    }

    function openSpoti() {
        // Obtenemos el ID de la canción actual desde el listener de Firebase
        db.ref(`salas/${sala}/game/spId`).once('value', s => {
            const id = s.val();
            if(id) window.location.href = "spotify:track:" + id;
        });
    }
</script>
